# ============================================================================
# AI tools declaration
# ============================================================================
ai_tools_used:
  - "Claude"

ai_usage_summary: |
  Used Claude Code for architecture design, implementation guidance, and code
  review throughout the project. All scoring logic, ontology design, and
  engineering decisions were made and validated by the team. No candidate
  profile data was passed to any LLM. The ranking pipeline itself is fully
  deterministic and runs without any LLM or API call.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Two-phase CPU-only pipeline. Offline: sentence-transformer embeddings
  (all-MiniLM-L6-v2) and four structured feature scores are precomputed for
  every candidate and saved to disk. Online: for a given JD, the JD is encoded,
  cosine similarity is computed via numpy matmul, and a final score is derived
  using a multiplicative role gate — role_score × (company×0.30 + skills×0.25
  + behavior×0.25 + semantic×0.20). Role score blends title-pattern matching
  with ML keyword density in actual job descriptions, making it harder to game
  than title alone. Skill scoring uses proficiency × log(duration) ×
  log(endorsements) depth across 9 JD-specific skill groups. Honeypot detection
  flags candidates with expert/advanced skills at zero duration or impossible
  role tenures, collapsing their score to near-zero. Reasoning is
  template-generated from observable profile fields with no LLM involvement.
  Ranking step runs in under 30 seconds for 100K candidates.

